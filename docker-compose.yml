services:
  postgres:
    image: postgres:16-alpine
    container_name: questions-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-questions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questions}
      POSTGRES_DB: ${POSTGRES_DB:-questions}
    volumes:
      - questions_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questions} -d ${POSTGRES_DB:-questions}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: questions-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-questions}:${POSTGRES_PASSWORD:-questions}@postgres:5432/${POSTGRES_DB:-questions}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-questions}:${POSTGRES_PASSWORD:-questions}@postgres:5432/${POSTGRES_DB:-questions}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../questions-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    container_name: questions-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: questions-pgadmin
    restart: unless-stopped
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@questions.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - postgres

volumes:
  questions_pgdata:
